async function fetchGS(onlyDiv){
  if(!S.gsUrl){cfgGS();return}
  const dt=document.getElementById('dDt')?.value||td2();
  toast('⏳ Buscando dados...');
  try{
    const resp=await fetch(S.gsUrl,{redirect:'follow'});
    if(!resp.ok)throw new Error('HTTP '+resp.status);
    const txt=await resp.text();
    if(txt.trim().startsWith('<')||txt.includes('<!DOCTYPE')){
      toast('Apps Script desatualizado! Reimplante com Nova Versão.');return;
    }
    let json;try{json=JSON.parse(txt)}catch{toast('Resposta inválida do servidor');console.error(txt);return}
    if(!json.success){throw new Error(json.error||'Erro desconhecido')}
    const allRows=json.rows||[];
    console.log('GS:',allRows.length,'linhas. Datas:',JSON.stringify([...new Set(allRows.map(r=>r.data))]));
    if(!allRows.length){toast('Planilha vazia');window._gsLog={dt,divs:[],mats:0};R();return}
    // Client-side date filter (flexible)
    const rows=allRows.filter(r=>{
      const rd=String(r.data||'').trim();
      if(rd===dt||rd.substring(0,10)===dt)return true;
      const p=rd.match(/(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{4})/);
      if(p){if(`${p[3]}-${p[2].padStart(2,'0')}-${p[1].padStart(2,'0')}`===dt)return true;if(`${p[3]}-${p[1].padStart(2,'0')}-${p[2].padStart(2,'0')}`===dt)return true}
      const dN=rd.replace(/\D/g,'').substring(0,8);if(dN===dt.replace(/\D/g,''))return true;
      try{const d=new Date(rd);if(!isNaN(d)){const y=d.getFullYear(),mo=String(d.getMonth()+1).padStart(2,'0'),dy=String(d.getDate()).padStart(2,'0');if(`${y}-${mo}-${dy}`===dt)return true}}catch{}
      return false;
    });
    console.log('GS: filtradas',rows.length,'linhas para',dt);
    if(!rows.length){toast(`Nenhum dado para ${dt} (${allRows.length} linhas no total)`);window._gsLog={dt,divs:[],mats:0};R();return}
    let updatedDivs=[],totalMats=0;
    rows.forEach(r=>{
      const div=parseDivName(String(r.divisao||''));
      if(!div)return;
      if(onlyDiv&&div!==onlyDiv)return;
      const sapStr=String(r.sap||'').trim();
      const mat=S.mats.find(m=>m.sap===sapStr||m.sap===sapStr.replace(/^0+/,''));
      if(!mat)return;
      const v=Number(r.quantidade);
      if(isNaN(v))return;
      const k=mat.id+'_'+div;
      if(!S.dh[k])S.dh[k]={};
      S.dh[k][dt]=v;
      totalMats++;
      if(!updatedDivs.includes(div))updatedDivs.push(div);
    });
    // Recalc totals
    S.mats.forEach(m=>{
      let t=0;DV.forEach(d=>{const h2=S.dh[m.id+'_'+d]||{};const l=Object.keys(h2).sort().pop();if(l)t+=h2[l]});
      m.e=t;if(!S.dh[m.id])S.dh[m.id]={};S.dh[m.id][dt]=t;
    });
    window._gsLog={dt,divs:updatedDivs,mats:totalMats};
    sv();toast(`✓ ${updatedDivs.length} divisão(ões) — ${totalMats} materiais!`);R();
  }catch(e){toast('Erro: '+e.message);console.error(e)}
}

function aR(){const mi=+document.getElementById('rmi').value;const m=getMat(mi);const r={id:ni(),matId:mi,mat:m?m.m:'',sap:m?m.sap:'',fo:document.getElementById('rf2').value,comp:document.getElementById('rc3').value,rc:document.getElementById('rn').value,dt:document.getElementById('rd').value,qtd:+document.getElementById('rq').value,ped:document.getElementById('rp2').value,prev:document.getElementById('rprev').value,st2:'RC Criada',nf:'',lt:0,ctId:document.getElementById('rct').value?+document.getElementById('rct').value:null,dtEnt:'',qtdEnt:0,div:''};
if(!r.mat){toast('Selecione material');return}if(r.ctId){const c=S.cts.find(x=>x.id===r.ctId);if(c){c.ab=Math.max(0,c.ab-r.qtd*c.pr);c.sd=c.fx>0?(c.ab/c.fx)*100:0}}S.rcs.push(r);sv();cM();toast('RC criada!');R()}
function advRC(id){const r=S.rcs.find(x=>x.id===id);if(!r)return;const i=RC_ST.indexOf(r.st2||'RC Criada');if(i===4){oM(`<button class="mc" onclick="cM()">✕</button><h3>📦 Confirmar Entrega</h3><div class="fg"><label class="fl">Data</label><input class="fi" id="ced" type="date" value="${td2()}"></div><div class="fg"><label class="fl">NF</label><input class="fi" id="cen"></div><div class="fg"><label class="fl">Qtd</label><input class="fi" id="ceq" type="number" value="${r.qtd}"></div><div class="fg"><label class="fl">Divisão</label><select class="fi" id="cev"><option>${DV[0]}</option><option>${DV[1]}</option></select></div><div style="display:flex;gap:8px;margin-top:12px"><button class="btn b1" onclick="confE(${id})">Confirmar</button><button class="btn b2" onclick="cM()">Cancelar</button></div>`)}else if(i<5){r.st2=RC_ST[i+1];sv();toast(`→ ${r.st2}`);R()}}
function confE(id){const r=S.rcs.find(x=>x.id===id);r.dtEnt=document.getElementById('ced').value;r.nf=document.getElementById('cen').value;r.qtdEnt=+document.getElementById('ceq').value;r.div=document.getElementById('cev').value;r.st2='Entregue';r.lt=Math.max(0,Math.round((new Date(r.dtEnt)-new Date(r.dt))/864e5));sv();cM();toast('Entregue!');R()}
function mailRC(id){const r=S.rcs.find(x=>x.id===id);if(!r)return;const ct=r.ctId?S.cts.find(c=>c.id===r.ctId):null;const to=ct?.em||'';const cc=(S.cc||[]).join(',');const subj=encodeURIComponent(`Requisição de ${r.mat} RC ${r.rc}`);const prev=r.prev?new Date(r.prev+'T12:00:00').toLocaleDateString('pt-BR'):'a definir';const body=encodeURIComponent(`Olá,\n\nSolicito a entrega do material ${r.mat} na quantidade ${r.qtd} com previsão de entrega na data ${prev} referente a RC ${r.rc}.\n\nAtenciosamente.`);window.open(`mailto:${to}?cc=${cc}&subject=${subj}&body=${body}`);toast('Email!')}
function addCC(){const v=document.getElementById('ccI')?.value;if(!v||!v.includes('@'))return;if(!S.cc)S.cc=[];S.cc.push(v);sv();R()}
function rmCC(i){S.cc.splice(i,1);sv();R()}
function dR(id){if(!confirm('Remover?'))return;S.rcs=S.rcs.filter(r=>r.id!==id);sv();toast('Removido');R()}

// ===== PLANO DE AÇÃO =====
function rPa(){let q=(window._pQ||'').toLowerCase(),f=window._pF||'all';let d=S.acts.filter(a=>{if(q&&!a.ass.toLowerCase().includes(q)&&!a.resp.toLowerCase().includes(q))return false;if(f!=='all'&&a.st!==f)return false;return true});
let h=`<div class="st2">Plano de Ação</div><div class="tb"><input class="si" style="width:180px" placeholder="Buscar..." value="${window._pQ||''}" oninput="window._pQ=this.value;R()"><button class="fb ${f==='all'?'on':''}" onclick="window._pF='all';R()">Todas</button><button class="fb ${f==='Em andamento'?'on':''}" onclick="window._pF='Em andamento';R()">Andamento</button><button class="fb ${f==='Concluido'?'on':''}" onclick="window._pF='Concluido';R()">Concluído</button><button class="btn b1 bs2" onclick="mAP()">+ Ação</button></div>`;
d.forEach(a=>{h+=`<div class="ac3"><div style="color:var(--ac);font-weight:600;min-width:80px;font-size:10px">${a.resp}</div><div style="flex:1"><div style="font-weight:600;font-size:12px">${a.ass}</div><div style="font-size:10px;color:var(--t3)">${a.obs}</div></div>${bd(sb2(a.st),a.st)}<div class="mono" style="font-size:10px;color:var(--t3);min-width:60px;text-align:right">${a.dt||'—'}</div><div style="display:flex;gap:2px">${a.st!=='Concluido'&&a.st!=='Cancelado'?`<button class="bs2 b1" onclick="cPA(${a.id})">✓</button>`:''}<button class="bs2 b3" onclick="xPA(${a.id})">✕</button><button class="bs2 b3" onclick="dPA(${a.id})">🗑</button></div></div>`});return h}
function mAP(){oM(`<button class="mc" onclick="cM()">✕</button><h3>Nova Ação</h3><div class="fr"><div class="fg"><label class="fl">Responsável</label><input class="fi" id="pr"></div><div class="fg"><label class="fl">Assunto</label><input class="fi" id="pa3"></div></div><div class="fg"><label class="fl">Obs</label><input class="fi" id="po"></div><div class="fr"><div class="fg"><label class="fl">Status</label><select class="fi" id="ps"><option>Não iniciado</option><option>Em andamento</option></select></div><div class="fg"><label class="fl">Prazo</label><input class="fi" id="pd2"></div></div><div style="display:flex;gap:8px;margin-top:12px"><button class="btn b1" onclick="aPA()">Salvar</button><button class="btn b2" onclick="cM()">Cancelar</button></div>`)}
function aPA(){const a={id:ni(),resp:document.getElementById('pr').value,ass:document.getElementById('pa3').value,obs:document.getElementById('po').value,st:document.getElementById('ps').value,dt:document.getElementById('pd2').value};if(!a.ass){toast('Assunto');return}S.acts.push(a);sv();cM();toast('Criada!');R()}
function cPA(id){const a=S.acts.find(x=>x.id===id);if(a){a.st='Concluido';a.dt=new Date().toLocaleDateString('pt-BR');sv();toast('Concluída!');R()}}
function xPA(id){const a=S.acts.find(x=>x.id===id);if(a){a.st='Cancelado';sv();toast('Cancelada');R()}}
function dPA(id){if(!confirm('Remover?'))return;S.acts=S.acts.filter(a=>a.id!==id);sv();toast('Removida');R()}

// ===== TIMELINE =====
function rTl(){let sel=window._tP||S.mats[0]?.m||'';let opts=S.mats.map(m=>`<option ${m.m===sel?'selected':''}>${m.sap||''} — ${m.m}</option>`).join('');const mat=S.mats.find(m=>m.m===sel||`${m.sap} — ${m.m}`===sel);const matR=mat||S.mats[0];const hist=matR?S.dh[matR.id]||{}:{};const ent=Object.entries(hist).sort((a,b)=>a[0].localeCompare(b[0]));let ch='';if(ent.length>1){const cd=gC(matR.id);const mx=Math.max(...ent.map(e=>cd>0?e[1]/cd:0),1);ch=ent.map(([d,v])=>{const ds=cd>0?v/cd:0;const h=Math.max(4,(ds/mx)*190);const c=ds<matR.mn?'var(--d)':ds<matR.rp?'var(--w)':'var(--ac)';return`<div class="bc2"><div class="bv2">${ds.toFixed(0)}</div><div class="bar" style="height:${h}px;background:${c}"></div><div class="bl">${d.substring(5)}</div></div>`}).join('')}
return`<div class="st2">Time Line</div><div class="tb"><select class="si" style="width:220px" onchange="window._tP=this.options[this.selectedIndex].text.split(' — ').pop();R()">${opts}</select></div><div class="cc"><div class="ct">${sapTag(matR?.sap)} ${matR?.m||sel}</div>${ent.length>1?`<div style="overflow-x:auto"><div class="bw" style="min-width:${ent.length*32}px;height:200px">${ch}</div></div>`:'<div style="padding:20px;text-align:center;color:var(--t3);font-size:12px">Registre ao menos 2 dias</div>'}</div>${matR?`<div class="g3"><div class="k c"><div class="kl">Estoque</div><div class="kv">${fm(matR.e)}</div></div><div class="k ${gD(matR)<matR.mn?'r':'g'}"><div class="kl">Dias</div><div class="kv">${fd(gD(matR))}</div></div><div class="k a"><div class="kl">Cons/mês</div><div class="kv">${fm(gC(matR.id)*30)}</div></div></div>`:''}`}

// ===== RF =====
function rRf(){let q=(window._rfQ||'').toLowerCase();let d=S.rf.filter(r=>!q||r.ins.toLowerCase().includes(q));
return`<div class="st2">Consumo RF — Editável</div><div class="tb"><input class="si" style="width:180px" placeholder="Buscar..." value="${window._rfQ||''}" oninput="window._rfQ=this.value;R()"><button class="btn b1 bs2" onclick="svRf()">💾 Salvar</button><button class="btn b5 bs2" onclick="mARf()">+ Material</button></div><div class="tw" style="max-height:400px;overflow-y:auto"><table><thead><tr><th>SAP</th><th>Insumo</th><th>Cat</th>${MS.map(m=>`<th>${m}</th>`).join('')}<th>TT</th></tr></thead><tbody>${d.map((r,ri)=>{const m=getMat(r.matId);const tt=r.m26.reduce((a,b)=>a+b,0);return`<tr><td>${sapTag(m?.sap)}</td><td style="font-weight:600">${r.ins}</td><td>${bd('bc',r.cat)}</td>${r.m26.map((v,mi)=>`<td><input class="ed" value="${Math.round(v)}" onchange="S.rf[${ri}].m26[${mi}]=+this.value"></td>`).join('')}<td class="mono" style="font-weight:700;color:var(--ac)">${fm(tt)}</td></tr>`}).join('')}</tbody></table></div>`}
function svRf(){sv();toast('RF salvo!')}
function mARf(){
  // Only show materials not already in RF
  const existing=new Set(S.rf.map(r=>r.matId));
  const avail=S.mats.filter(m=>!existing.has(m.id));
  if(!avail.length){toast('Todos os materiais já estão no RF');return}
  oM(`<button class="mc" onclick="cM()">✕</button><h3>Adicionar Material ao RF</h3><div class="fg"><label class="fl">Material (Warehouse)</label><select class="fi" id="rfm">${avail.map(m=>`<option value="${m.id}">${m.sap||''} — ${m.m}</option>`).join('')}</select></div><div class="fg"><label class="fl">Categoria</label><input class="fi" id="rfc"></div><div style="display:flex;gap:8px;margin-top:12px"><button class="btn b1" onclick="aRf()">Adicionar</button><button class="btn b2" onclick="cM()">Cancelar</button></div>`)
}
function aRf(){const mi=+document.getElementById('rfm').value;const m=getMat(mi);if(!m){toast('Selecione');return}S.rf.push({ins:m.m,matId:mi,cat:document.getElementById('rfc').value||m.g,h24:new Array(12).fill(0),h25:new Array(12).fill(0),m26:new Array(12).fill(0)});sv();cM();toast('Adicionado!');R()}

// ===== HISTÓRICO =====
function rH(){let h=`<div class="st2">Histórico 2024 · 2025 · 2026</div><div class="cc"><div class="ct">📅 Calendário Sazonal</div><div style="display:grid;grid-template-columns:repeat(12,1fr);gap:3px">`;
[{m:'Jan',t:['Plantio','Chuva'],c:['tg2','tr2']},{m:'Fev',t:['Plantio','Chuva'],c:['tg2','tr2']},{m:'Mar',t:['Chuva'],c:['tr2']},{m:'Abr',t:['Pragas'],c:['tp2']},{m:'Mai',t:['Pragas','Formiga'],c:['tp2','tp2']},{m:'Jun',t:['Formiga'],c:['tp2']},{m:'Jul',t:['Formiga'],c:['tp2']},{m:'Ago',t:['Manutenção'],c:['tw3']},{m:'Set',t:['Manutenção'],c:['tw3']},{m:'Out',t:['Preparo'],c:['tw3']},{m:'Nov',t:['Plantio'],c:['tg2']},{m:'Dez',t:['Plantio','Chuva'],c:['tg2','tr2']}].forEach(s=>{h+=`<div style="text-align:center;padding:4px 2px;border-radius:5px;background:var(--s2);border:1px solid var(--bd)"><div style="font-weight:600;font-size:10px;margin-bottom:2px">${s.m}</div>${s.t.map((t,i)=>`<span class="tag ${s.c[i]}">${t}</span>`).join('')}</div>`});h+=`</div></div>`;
// Show ALL materials — use RF data if available, otherwise show placeholder
S.mats.forEach(mat=>{
  const rf=S.rf.find(r=>r.matId===mat.id);
  const has24=rf&&rf.h24&&rf.h24.some(v=>v>0);
  const has25=rf&&rf.h25&&rf.h25.some(v=>v>0);
  const has26=rf&&rf.m26&&rf.m26.some(v=>v>0);
  const hasAny=has24||has25||has26;
  const h24=rf?rf.h24:new Array(12).fill(0);
  const h25=rf?rf.h25:new Array(12).fill(0);
  const m26=rf?rf.m26:new Array(12).fill(0);
  const cat=rf?rf.cat:mat.g;
  const a24=h24.reduce((a,b)=>a+b,0)/12,a25=h25.reduce((a,b)=>a+b,0)/12,a26=m26.reduce((a,b)=>a+b,0)/12;
  const pks=[];h25.forEach((v,i)=>{if(a25>0&&v>a25*1.4)pks.push(MS[i])});
  const mx=Math.max(...h24,...h25,...m26,1);
  h+=`<div class="cc"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px"><span style="font-weight:600;font-size:12px">${sapTag(mat.sap)} ${mat.m} ${bd('bc',cat)}</span><span style="font-size:9px;color:var(--t3)">24:${fm(a24)} · 25:${fm(a25)} · 26:${fm(a26)}/mês</span></div>`;
  if(pks.length)h+=`<div class="ha">⚠ Picos 2025: ${pks.map(p=>`<span class="tag tw3">${p}</span>`).join('')}</div>`;
  if(hasAny){
    h+=`<div style="display:flex;align-items:flex-end;gap:2px;height:60px">`;for(let i=0;i<12;i++){const hh24=Math.max(1,(h24[i]/mx)*50),hh25=Math.max(1,(h25[i]/mx)*50),hh26=Math.max(1,(m26[i]/mx)*50);h+=`<div style="flex:1;display:flex;gap:1px;align-items:flex-end"><div style="flex:1;height:${hh24}px;background:rgba(100,116,139,.3);border-radius:2px 2px 0 0" title="24 ${MS[i]}: ${fm(h24[i])}"></div><div style="flex:1;height:${hh25}px;background:rgba(167,139,250,.4);border-radius:2px 2px 0 0" title="25 ${MS[i]}: ${fm(h25[i])}"></div><div style="flex:1;height:${hh26}px;background:var(--ac);border-radius:2px 2px 0 0" title="26 ${MS[i]}: ${fm(m26[i])}"></div></div>`}
    h+=`</div><div style="display:flex;gap:2px;margin:2px 0">`;MS.forEach(m2=>h+=`<div style="flex:1;text-align:center;font-size:7px;color:var(--t3)">${m2}</div>`);
    h+=`</div><div style="display:flex;gap:12px;font-size:9px;color:var(--t3)"><span style="display:flex;align-items:center;gap:3px"><span style="width:7px;height:7px;background:rgba(100,116,139,.3);border-radius:1px"></span>2024</span><span style="display:flex;align-items:center;gap:3px"><span style="width:7px;height:7px;background:rgba(167,139,250,.4);border-radius:1px"></span>2025</span><span style="display:flex;align-items:center;gap:3px"><span style="width:7px;height:7px;background:var(--ac);border-radius:1px"></span>2026</span></div>`;
  }else{
    h+=`<div style="padding:10px;text-align:center;color:var(--t3);font-size:10px">Sem dados RF. Adicione no <strong style="color:var(--ac)">Consumo RF</strong> para ver comparativo.</div>`;
  }
  h+=`</div>`;
});return h}

// ===== FERRAMENTAS =====
function rTo(){const del=S.rcs.filter(r=>r.st2==='Entregue'&&r.lt>0);const avgLt=del.length?del.reduce((a,r)=>a+r.lt,0)/del.length:0;const byF={};del.forEach(r=>{if(!byF[r.fo])byF[r.fo]={s:0,n:0};byF[r.fo].s+=r.lt;byF[r.fo].n++});
const ms=S.mats.map(m=>({...m,dias:gD(m),cons:gC(m.id)*30})).filter(m=>m.cons>0).sort((a,b)=>a.dias-b.dias);
let h=`<div class="st2">Ferramentas</div><div class="g2"><div class="cc"><div class="ct">📊 Previsão de Ruptura</div>`;
ms.slice(0,12).forEach(m=>{const dt=new Date();dt.setDate(dt.getDate()+Math.floor(m.dias));const cl=m.dias<15?'var(--d)':m.dias<30?'var(--w)':'var(--ac)';h+=`<div style="display:flex;align-items:center;gap:6px;margin-bottom:4px;font-size:10px">${sapTag(m.sap)}<span style="min-width:80px;font-weight:600">${m.m}</span><span class="mono" style="min-width:30px;color:${cl};font-weight:700">${m.dias.toFixed(0)}d</span><span style="font-size:9px;color:var(--t3)">→ ${m.dias<999?dt.toLocaleDateString('pt-BR'):''}</span></div>`});
h+=`</div><div class="cc"><div class="ct">⏱ Lead Time</div><div style="margin-bottom:8px;font-size:11px">Média: <strong class="mono" style="color:var(--ac)">${avgLt.toFixed(0)}d</strong></div>`;
Object.entries(byF).sort((a,b)=>(b[1].s/b[1].n)-(a[1].s/a[1].n)).forEach(([f,d])=>{const av=d.s/d.n;const cl=av>30?'var(--d)':av>15?'var(--w)':'var(--g)';h+=`<div style="display:flex;align-items:center;gap:6px;margin-bottom:3px;font-size:10px"><span style="min-width:90px">${f}</span><span class="mono" style="color:${cl};font-weight:600">${av.toFixed(0)}d</span><span style="font-size:9px;color:var(--t3)">(${d.n}x)</span></div>`});
if(!del.length)h+=`<div style="color:var(--t3);font-size:10px">Confirme entregas para dados</div>`;
h+=`</div></div><div class="cc"><div class="ct">📋 Workflow</div>`;
S.rcs.slice(-6).reverse().forEach(r=>{const i=RC_ST.indexOf(r.st2||'RC Criada');h+=`<div style="display:flex;align-items:center;gap:6px;margin-bottom:6px;padding:6px;background:var(--s2);border-radius:6px;font-size:10px">${sapTag(r.sap)}<span style="min-width:70px;font-weight:600">${r.mat}</span><div class="wf">${rcWf(i)}</div></div>`});
if(!S.rcs.length)h+=`<div style="color:var(--t3);font-size:10px">Nenhuma RC</div>`;
h+=`</div><div class="cc"><div class="ct">📊 Índice de Cobertura (60d)</div>`;
ms.map(m=>({...m,idx:m.cons>0?(m.e/(m.cons/30*60))*100:999})).sort((a,b)=>a.idx-b.idx).slice(0,12).forEach(m=>{const p=Math.min(100,m.idx);const cl=p<50?'var(--d)':p<80?'var(--w)':'var(--g)';h+=`<div style="display:flex;align-items:center;gap:6px;margin-bottom:4px;font-size:10px">${sapTag(m.sap)}<span style="min-width:80px">${m.m}</span><div style="flex:1;height:5px;background:var(--s3);border-radius:3px;overflow:hidden"><div style="width:${p}%;height:100%;background:${cl};border-radius:3px"></div></div><span class="mono" style="min-width:30px;color:${cl}">${m.idx<999?m.idx.toFixed(0)+'%':'∞'}</span></div>`});
h+=`</div>`;return h}

init();
</script>
</body>
</html>
